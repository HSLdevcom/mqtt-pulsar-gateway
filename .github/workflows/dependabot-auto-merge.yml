name: Dependabot auto-merge

on: pull_request

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: |
      github.actor == 'dependabot[bot]' &&                                                                                                                                
      github.base_ref == 'master'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@ffa630c65fa7e0ecfa0625b5ceda64399aea1b36
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-approve grouped updates
        if: steps.metadata.outputs.dependency-group != ''
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for grouped updates
        if: steps.metadata.outputs.dependency-group != ''
        run: gh pr merge --auto --rebase "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on ungrouped updates requiring manual review
        if: steps.metadata.outputs.dependency-group == ''
        run: |
          gh pr comment "$PR_URL" --body \
            "This is an ungrouped **$UPDATE_TYPE** update and requires manual review before merging into \`develop\`."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}