name: CI/CD

on: [push, pull_request]

jobs:
  build:
    uses: HSLdevcom/transitdata-shared-workflows/.github/workflows/ci-cd-java.yml@issue/73261-enforce-running-tests-inside-docker-container
    secrets:
      DOCKER_USERNAME: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
      DOCKER_PASSWORD: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
    with:
      uploadJarArtifact: true
      jarArtifactName: mqtt-pulsar-gateway-jar-with-dependencies.jar
      jarArtifactPath: target/mqtt-pulsar-gateway-jar-with-dependencies.jar
      workingDirectory: .
      runTestsInsideDocker: true

  build-develop-docker-image:
    needs: build
    runs-on: ubuntu-latest
    # Run only on develop branch
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v3
      - name: Download .jar file
        uses: actions/download-artifact@v4
        with:
          name: mqtt-pulsar-gateway-jar-with-dependencies.jar
          path: target
      - name: Build and publish develop Docker image
        uses: elgohr/Publish-Docker-Github-Action@master
        with:
          name: hsldevcom/mqtt-pulsar-gateway
          username: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
          password: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
          tags: develop
  build-release-docker-image:
    needs: build
    runs-on: ubuntu-latest
    # Run only for tagged commits
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3
      - name: Download .jar file
        uses: actions/download-artifact@v4
        with:
          name: mqtt-pulsar-gateway-jar-with-dependencies.jar
          path: target
      - name: Build and publish release Docker image
        uses: elgohr/Publish-Docker-Github-Action@master
        with:
          name: hsldevcom/mqtt-pulsar-gateway
          username: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
          password: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
          tag_semver: true
  build-aks-dev-docker-image:
    needs: build
    runs-on: ubuntu-latest
    # Run only on aks-dev branch
    if: github.ref == 'refs/heads/aks-dev'
    steps:
      - uses: actions/checkout@v3
      - name: Download .jar file
        uses: actions/download-artifact@v4
        with:
          name: mqtt-pulsar-gateway-jar-with-dependencies.jar
          path: target
      - name: Build and publish aks-dev Docker image
        uses: elgohr/Publish-Docker-Github-Action@master
        with:
          name: hsldevcom/mqtt-pulsar-gateway
          username: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
          password: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
          tags: aks-dev
  build-aks-prod-docker-image:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/aks-prod'
    steps:
      - uses: actions/checkout@v3
      - name: Download .jar file
        uses: actions/download-artifact@v4
        with:
          name: mqtt-pulsar-gateway-jar-with-dependencies.jar
          path: target
      - name: Build and publish aks-prod Docker image
        uses: elgohr/Publish-Docker-Github-Action@master
        with:
          name: hsldevcom/mqtt-pulsar-gateway
          username: ${{ secrets.TRANSITDATA_DOCKERHUB_USER }}
          password: ${{ secrets.TRANSITDATA_DOCKERHUB_TOKEN }}
          tags: aks-prod
